<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PSPrinth</title>
    <link rel="icon" href="https://i.postimg.cc/5tYNSn3W/upscalemedia-transformed.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: ['class', '[data-theme="dark"]'],
        theme: {
          extend: {
            colors: {
              background: 'var(--bg-color)',
              surface: 'var(--surface-color)',
              'surface-hover': 'var(--surface-hover)',
              primary: 'var(--color-primary)',
              secondary: 'var(--text-secondary)',
              border: 'var(--border-color)',
              text: 'var(--text-main)',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --color-primary: #1bd96a;
        
        /* Light Mode */
        --bg-color: #f9fafb;
        --surface-color: #ffffff;
        --surface-hover: #f3f4f6;
        --text-main: #111827;
        --text-secondary: #6b7280;
        --border-color: #e5e7eb;
      }

      [data-theme='dark'] {
        /* Dark Mode */
        --bg-color: #0f0f0f;
        --surface-color: #1c1c1c;
        --surface-hover: #252525;
        --text-main: #f9fafb;
        --text-secondary: #9ca3af;
        --border-color: #2d2d2d;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        transition: background-color 0.5s ease, color 0.5s ease;
      }
      
      /* Smooth transitions for all color changes */
      *, *::before, *::after {
        transition-property: background-color, border-color, color, fill, stroke;
        transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
        transition-duration: 300ms;
      }
      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0f0f0f; 
      }
      ::-webkit-scrollbar-thumb {
        background: #333; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #1bd96a; 
      }
    </style>
  <script type="importmap">

  "imports": {
    "react": "https://esm.sh/react@^19.2.4",

    "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "skinview3d": "https://esm.sh/skinview3d@3.0.1"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
